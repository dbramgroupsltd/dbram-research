<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Writer Dashboard – DBRAM Research</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .status-assigned { background: #fef3c7; color: #92400e; }
    .status-in_progress { background: #dbeafe; color: #1e40af; }
    .status-submitted { background: #d1fae5; color: #065f46; }
    .badge { font-size: 0.75rem; padding: 0.35em 0.7em; border-radius: 20px; font-weight: 600; }
    .upload-form { display: inline; }
  </style>
</head>
<body>
<div id="navbar-placeholder"></div>

<section class="section">
  <div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div><h2 class="fw-bold">Writer Dashboard</h2><p class="text-muted" id="welcomeMsg">Welcome!</p></div>
      <button id="logoutBtn" class="btn btn-outline-danger btn-sm"><i class="bi bi-box-arrow-right"></i> Logout</button>
    </div>

    <div class="card border-0 shadow-sm">
      <div class="card-header bg-white fw-bold border-0">My Assigned Jobs</div>
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-hover mb-0">
            <thead class="table-light">
              <tr><th>Order</th><th>Client</th><th>Subject</th><th>Deadline</th><th>Status</th><th>Files</th><th>Action</th></tr>
            </thead>
            <tbody id="writerJobsTable"><tr><td colspan="7" class="text-center py-4">Loading...</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- File Management Modal -->
<div class="modal fade" id="fileModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Files for Order #<span id="fileOrderId"></span></h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="fileList" class="mb-3"></div>
        <hr>
        <h6>Upload Completed Work</h6>
        <form id="fileUploadForm">
          <input type="hidden" id="uploadOrderId">
          <div class="mb-2">
            <input type="file" class="form-control" id="fileInput" required>
          </div>
          <div class="mb-2">
            <input type="text" class="form-control" id="fileDescription" placeholder="Description (optional)">
          </div>
          <button type="submit" class="btn btn-primary">Upload File</button>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/nav.js"></script>
<script>
  async function fetchJobs() {
    try {
      const res = await fetch('/api/writer/jobs');
      const jobs = await res.json();
      const tbody = document.getElementById('writerJobsTable');
      
      if (!jobs.length) {
        tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-4">No jobs assigned yet.</td></tr>';
        return;
      }
      
      tbody.innerHTML = jobs.map(job => `
        <tr>
          <td class="fw-semibold">${escapeHtml(job.title)}</td>
          <td>${escapeHtml(job.client_name)}</td>
          <td>${escapeHtml(job.subject)}</td>
          <td>${job.deadline || '—'}</td>
          <td><span class="badge status-${job.status}">${job.status.replace('_', ' ')}</span></td>
          <td><button class="btn btn-sm btn-outline-primary view-files-btn" data-order-id="${job.order_id}"><i class="bi bi-files"></i> Files</button></td>
          <td>
            ${job.status === 'assigned' ? `<button class="btn btn-sm btn-outline-primary update-status-btn me-1" data-id="${job.id}" data-status="in_progress">Start</button>` : ''}
            ${job.status === 'in_progress' ? `
              <button class="btn btn-sm btn-outline-success update-status-btn me-1" data-id="${job.id}" data-status="submitted">Submit</button>
              <button class="btn btn-sm btn-outline-info view-files-btn" data-order-id="${job.order_id}">Upload</button>
            ` : ''}
            ${job.status === 'submitted' ? `<span class="badge bg-success">Submitted</span>` : ''}
            ${job.file_path ? `<a href="/api/admin/download/${job.id}" class="btn btn-sm btn-outline-secondary" target="_blank">View File</a>` : ''}
          </td>
        </tr>
      `).join('');

      // Attach status update events
      document.querySelectorAll('.update-status-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const jobId = btn.dataset.id;
          const status = btn.dataset.status;
          try {
            const res = await fetch(`/api/writer/jobs/${jobId}/status`, {
              method: 'PATCH',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ status })
            });
            if (res.ok) fetchJobs();
            else alert('Update failed');
          } catch (err) {
            alert('Network error');
          }
        });
      });

      // File view button
      document.querySelectorAll('.view-files-btn').forEach(btn => {
        btn.addEventListener('click', () => openFileModal(btn.dataset.orderId));
      });

    } catch (err) {
      console.error('Error fetching jobs:', err);
      document.getElementById('writerJobsTable').innerHTML = '<tr><td colspan="7" class="text-center text-danger py-4">Error loading jobs</td></tr>';
    }
  }

  // ─── FILE MANAGEMENT ─────────────────────────────────────────────────────────
  async function openFileModal(orderId) {
    document.getElementById('fileOrderId').textContent = orderId;
    document.getElementById('uploadOrderId').value = orderId;
    document.getElementById('fileList').innerHTML = '<div class="text-muted">Loading files...</div>';
    document.getElementById('fileUploadForm').reset();
    
    const modal = new bootstrap.Modal(document.getElementById('fileModal'));
    modal.show();
    
    await loadFiles(orderId);
  }

  async function loadFiles(orderId) {
    try {
      const res = await fetch(`/api/orders/${orderId}/files`);
      const files = await res.json();
      const container = document.getElementById('fileList');
      if (!files.length) {
        container.innerHTML = '<div class="text-muted">No files uploaded yet. Upload your completed work below.</div>';
        return;
      }
      container.innerHTML = files.map(file => `
        <div class="d-flex justify-content-between align-items-center border-bottom py-2">
          <div>
            <i class="bi bi-file-earmark"></i>
            <strong>${escapeHtml(file.file_name)}</strong>
            <div class="text-muted small">Uploaded by: ${escapeHtml(file.uploader_name)} (${file.uploader_role})</div>
            ${file.description ? `<div class="text-muted small">${escapeHtml(file.description)}</div>` : ''}
          </div>
          <div>
            <a href="/api/files/${file.id}/download" class="btn btn-sm btn-outline-primary" target="_blank">
              <i class="bi bi-download"></i>
            </a>
          </div>
        </div>
      `).join('');
    } catch (err) {
      document.getElementById('fileList').innerHTML = '<div class="text-danger">Error loading files.</div>';
    }
  }

  // File upload form
  document.getElementById('fileUploadForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const orderId = document.getElementById('uploadOrderId').value;
    const fileInput = document.getElementById('fileInput');
    const description = document.getElementById('fileDescription').value.trim();
    const file = fileInput.files[0];
    if (!file) return;

    const formData = new FormData();
    formData.append('file', file);
    formData.append('description', description);

    try {
      const res = await fetch(`/api/orders/${orderId}/files`, {
        method: 'POST',
        body: formData
      });
      const data = await res.json();
      if (data.ok) {
        alert('File uploaded successfully!');
        fileInput.value = '';
        document.getElementById('fileDescription').value = '';
        await loadFiles(orderId);
      } else {
        alert(data.msg || 'Upload failed');
      }
    } catch (err) {
      alert('Network error.');
    }
  });

  function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]);
  }

  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await fetch('/api/logout', { method: 'POST' });
    window.location.href = '/';
  });

  async function fetchUser() {
    const res = await fetch('/api/me');
    if (res.ok) {
      const user = await res.json();
      document.getElementById('welcomeMsg').innerHTML = `Hello, <strong>${escapeHtml(user.name)}</strong>`;
    }
  }

  fetchUser();
  fetchJobs();
</script>
</body>
</html>
