<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apply as Writer – DBRAM Research</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div id="navbar-placeholder"></div>

<section class="section">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-6">
        <div class="card border-0 shadow-sm">
          <div class="card-body p-4">
            <h2 class="text-center fw-bold mb-2">✍️ Join Our Writing Team</h2>
            <p class="text-center text-muted mb-4">Fill in your details below to apply as a writer.</p>
            
            <div id="applyAlert" class="alert d-none"></div>
            
            <form id="applyForm">
              <div class="mb-3">
                <label class="form-label fw-semibold">Full Name</label>
                <input type="text" class="form-control" id="applyName" placeholder="e.g., John Doe" required>
              </div>
              <div class="mb-3">
                <label class="form-label fw-semibold">Email Address</label>
                <input type="email" class="form-control" id="applyEmail" placeholder="writer@example.com" required>
              </div>
              <div class="mb-4">
                <label class="form-label fw-semibold">Qualifications & Experience</label>
                <textarea class="form-control" id="applyQual" rows="5" placeholder="Tell us about your academic background, writing experience, subjects you specialize in..."></textarea>
                <small class="text-muted">We'll review your qualifications and get back to you within 2-3 business days.</small>
              </div>
              <button type="submit" class="btn btn-primary w-100" id="applyBtn">
                <span id="applySpinner" class="spinner-border spinner-border-sm d-none me-2"></span>
                Submit Application
              </button>
            </form>
            
            <p class="text-center mt-3"><a href="/">← Back to home</a></p>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<footer class="bg-dark text-white-50 py-4 mt-5">
  <div class="container text-center">
    <p class="mb-0">© 2024 DBRAM Research. All rights reserved.</p>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/nav.js"></script>
<script>
  document.getElementById('applyForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const name = document.getElementById('applyName').value.trim();
    const email = document.getElementById('applyEmail').value.trim();
    const qualifications = document.getElementById('applyQual').value.trim();
    const alertDiv = document.getElementById('applyAlert');
    const btn = document.getElementById('applyBtn');
    const spinner = document.getElementById('applySpinner');
    
    alertDiv.classList.add('d-none');
    if (!name || !email || !qualifications) {
      alertDiv.classList.remove('d-none', 'alert-success');
      alertDiv.classList.add('alert-danger');
      alertDiv.textContent = 'All fields are required.';
      return;
    }
    
    btn.disabled = true;
    spinner.classList.remove('d-none');
    
    try {
      const res = await fetch('/api/writer/apply', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, qualifications })
      });
      const data = await res.json();
      if (data.ok) {
        alertDiv.classList.remove('d-none', 'alert-danger');
        alertDiv.classList.add('alert-success');
        alertDiv.textContent = '✅ Application submitted successfully! We\'ll contact you via email.';
        document.getElementById('applyForm').reset();
      } else {
        alertDiv.classList.remove('d-none', 'alert-success');
        alertDiv.classList.add('alert-danger');
        alertDiv.textContent = data.msg || 'Submission failed.';
      }
    } catch (err) {
      alertDiv.classList.remove('d-none', 'alert-success');
      alertDiv.classList.add('alert-danger');
      alertDiv.textContent = 'Network error. Please try again.';
    } finally {
      btn.disabled = false;
      spinner.classList.add('d-none');
    }
  });
</script>
</body>
</html>
